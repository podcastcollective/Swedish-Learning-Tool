// ============================================================
// TEXT-TO-SPEECH
// ============================================================
function speak(text, lang = 'sv-SE') {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.85;
  // Try to find a Swedish voice
  const voices = window.speechSynthesis.getVoices();
  const sv = voices.find(v => v.lang.startsWith('sv'));
  if (sv) u.voice = sv;
  window.speechSynthesis.speak(u);
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function SpeakButton({ text, size = 'md', lang = 'sv-SE' }) {
  const sizes = { sm: 'w-6 h-6 text-xs', md: 'w-8 h-8 text-sm', lg: 'w-10 h-10 text-base' };
  return (
    <button onClick={(e) => { e.stopPropagation(); speak(text, lang); }}
      className={`speak-btn ${sizes[size]} inline-flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-blue-400 hover:text-blue-300 flex-shrink-0`}
      title="Listen">
      &#9654;
    </button>
  );
}

// ============================================================
// SPACED REPETITION ENGINE
// ============================================================
const SRS = {
  INTERVALS: [0, 1, 3, 7, 14, 30, 60],
  load() { try { return JSON.parse(localStorage.getItem('swedish_srs') || '{}'); } catch { return {}; } },
  save(data) { localStorage.setItem('swedish_srs', JSON.stringify(data)); },
  updateCard(id, correct) {
    const data = this.load();
    const card = data[id] || { box: 0, nextReview: 0, correct: 0, wrong: 0 };
    if (correct) { card.box = Math.min(card.box + 1, this.INTERVALS.length - 1); card.correct++; }
    else { card.box = Math.max(card.box - 1, 0); card.wrong++; }
    card.nextReview = Date.now() + this.INTERVALS[card.box] * 86400000;
    data[id] = card;
    this.save(data);
  },
  getDueCards(ids) {
    const data = this.load();
    const now = Date.now();
    return ids.filter(id => { const c = data[id]; return !c || c.nextReview <= now; });
  },
  getStats() {
    const data = this.load();
    const entries = Object.values(data);
    return {
      total: entries.length,
      mastered: entries.filter(c => c.box >= 5).length,
      learning: entries.filter(c => c.box > 0 && c.box < 5).length,
      totalCorrect: entries.reduce((s, c) => s + c.correct, 0),
      totalWrong: entries.reduce((s, c) => s + c.wrong, 0),
    };
  },
  reset() { localStorage.removeItem('swedish_srs'); },
};

// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// ---- Study Mode (Smart SRS Review — all card types) ----
function StudyMode() {
  const allIds = useMemo(() => {
    const ids = [];
    VERBS.forEach((v, i) => { ALL_TENSES.forEach((t, ti) => { if (t.getForm(v) !== null) ids.push(`verb:${i}:${ti}`); }); });
    Object.entries(VOCAB).forEach(([cat, words]) => { words.forEach((w, i) => ids.push(`vocab:${cat}:${i}`)); });
    PHRASES.forEach((p, i) => ids.push(`phrase:${i}`));
    SENTENCES.forEach((s, i) => ids.push(`sentence:${i}`));
    PREPOSITIONS.forEach((p, i) => ids.push(`prep:${i}`));
    return ids;
  }, []);

  const [queue, setQueue] = useState([]);
  const [current, setCurrent] = useState(null);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [streak, setStreak] = useState(0);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });
  const inputRef = useRef(null);

  const buildQueue = useCallback(() => {
    let due = SRS.getDueCards(allIds);
    if (due.length === 0) due = allIds;
    const shuffled = shuffle(due).slice(0, 20);
    setQueue(shuffled);
    return shuffled;
  }, [allIds]);

  useEffect(() => { const q = buildQueue(); if (q.length > 0) setCurrent(q[0]); }, []);
  useEffect(() => { if (feedback === null && inputRef.current) inputRef.current.focus(); }, [current, feedback]);

  const parseId = (id) => {
    if (!id) return null;
    const parts = id.split(':');
    if (parts[0] === 'verb') {
      const vi = parseInt(parts[1]), ti = parseInt(parts[2]);
      const verb = VERBS[vi], tense = ALL_TENSES[ti];
      return { type: 'verb', question: `${verb[5]} - ${tense.label}`, answer: tense.getForm(verb), hint: verb[0], tag: tense.label, tagColor: tense.color, speakText: tense.getForm(verb) };
    } else if (parts[0] === 'vocab') {
      const cat = parts[1], wi = parseInt(parts[2]), word = VOCAB[cat][wi];
      return { type: 'vocab', question: word[1], answer: word[0], hint: word[2] === 'en' || word[2] === 'ett' ? `(${word[2]}) - ${word[3]}` : word[3], tag: cat, tagColor: 'text-cyan-400', speakText: word[0] };
    } else if (parts[0] === 'phrase') {
      const pi = parseInt(parts[1]), p = PHRASES[pi];
      return { type: 'phrase', question: p[1], answer: p[0], hint: p[2], tag: 'Phrase', tagColor: 'text-emerald-400', speakText: p[0] };
    } else if (parts[0] === 'sentence') {
      const si = parseInt(parts[1]), s = SENTENCES[si];
      return { type: 'sentence', question: s[0], answer: s[1], hint: s[2], tag: s[3], tagColor: 'text-amber-400', speakText: s[1] };
    } else if (parts[0] === 'prep') {
      const pi = parseInt(parts[1]), p = PREPOSITIONS[pi];
      return { type: 'prep', question: p[0].replace('___', '___'), answer: p[1], hint: p[3], tag: 'Preposition', tagColor: 'text-rose-400', speakText: p[0].replace('___', p[1]) };
    }
    return null;
  };

  const advance = () => {
    setFeedback(null); setInput('');
    const idx = queue.indexOf(current);
    if (idx < queue.length - 1) setCurrent(queue[idx + 1]);
    else { const q = buildQueue(); setCurrent(q[0] || null); }
  };

  const checkAnswer = () => {
    const card = parseId(current);
    if (!card) return;
    const userAns = input.trim().toLowerCase();
    const correctAns = card.answer.toLowerCase();
    const correct = userAns === correctAns;
    SRS.updateCard(current, correct);
    setFeedback({ correct, answer: card.answer, speakText: card.speakText });
    setSessionStats(s => ({ correct: s.correct + (correct ? 1 : 0), wrong: s.wrong + (correct ? 0 : 1) }));
    setStreak(correct ? streak + 1 : 0);
  };

  const handleKey = (e) => { if (e.key === 'Enter') { if (feedback) advance(); else if (input.trim()) checkAnswer(); } };
  const card = parseId(current);
  if (!card) return <div className="text-center py-20 text-gray-400"><p className="text-2xl mb-4">All caught up!</p></div>;
  const progress = queue.indexOf(current) + 1;

  return (
    <div className="max-w-xl mx-auto px-4 py-8 fade-in">
      <div className="flex items-center justify-between mb-6">
        <span className="text-sm text-gray-500">{progress}/{queue.length}</span>
        <div className="flex-1 mx-4 h-1.5 bg-gray-800 rounded-full overflow-hidden">
          <div className="h-full bg-blue-500 rounded-full transition-all" style={{ width: `${(progress / queue.length) * 100}%` }} />
        </div>
        {streak >= 3 && <span className={`text-sm font-bold text-yellow-400 ${streak >= 5 ? 'streak-glow' : ''} px-2 py-0.5 rounded`}>{streak} streak</span>}
      </div>

      <div className={`bg-gray-900 rounded-xl p-8 border border-gray-800 ${feedback?.correct === true ? 'correct-flash' : ''} ${feedback?.correct === false ? 'wrong-flash' : ''}`}>
        <div className="text-center mb-6">
          <span className={`text-xs font-medium px-2 py-0.5 rounded ${card.tagColor} bg-gray-800`}>{card.tag}</span>
        </div>
        <p className="text-xl sm:text-2xl font-semibold text-center mb-2">{card.question}</p>
        <p className="text-sm text-gray-500 text-center mb-8">{card.hint}</p>

        {card.type === 'sentence' ? (
          <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleKey(e); } }}
            disabled={feedback !== null} placeholder="Type the Swedish sentence..."
            className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-base focus:outline-none focus:border-blue-500 disabled:opacity-50 resize-none"
            rows={2} autoComplete="off" autoCorrect="off" spellCheck="false" />
        ) : (
          <input ref={inputRef} type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
            disabled={feedback !== null} placeholder={card.type === 'prep' ? 'Type the preposition...' : 'Type the Swedish...'}
            className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-lg focus:outline-none focus:border-blue-500 disabled:opacity-50"
            autoComplete="off" autoCorrect="off" spellCheck="false" />
        )}

        {feedback && (
          <div className="mt-6 text-center fade-in">
            {feedback.correct ? (
              <div className="flex items-center justify-center gap-2">
                <p className="text-green-400 text-lg font-semibold">Correct!</p>
                <SpeakButton text={feedback.speakText} />
              </div>
            ) : (
              <div>
                <p className="text-red-400 text-lg font-semibold mb-1">Not quite</p>
                <div className="flex items-center justify-center gap-2">
                  <p className="text-gray-300">Answer: <span className="font-bold text-white">{feedback.answer}</span></p>
                  <SpeakButton text={feedback.speakText} />
                </div>
              </div>
            )}
            <button onClick={advance} className="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Next (Enter)</button>
          </div>
        )}
        {!feedback && input.trim() && (
          <button onClick={checkAnswer} className="mt-4 w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Check (Enter)</button>
        )}
      </div>

      <div className="flex justify-center gap-8 mt-6 text-sm text-gray-500">
        <span className="text-green-400">{sessionStats.correct} correct</span>
        <span className="text-red-400">{sessionStats.wrong} wrong</span>
        <span>{Math.round((sessionStats.correct / Math.max(1, sessionStats.correct + sessionStats.wrong)) * 100)}%</span>
      </div>
    </div>
  );
}

// ---- Verb Drills ----
function VerbDrills() {
  const [verbIdx, setVerbIdx] = useState(null);
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(null);

  const startDrill = () => { setVerbIdx(Math.floor(Math.random() * VERBS.length)); setAnswers({}); setChecked(false); setScore(null); };
  useEffect(() => { startDrill(); }, []);
  const verb = verbIdx !== null ? VERBS[verbIdx] : null;

  const checkAll = () => {
    if (!verb) return;
    let correct = 0, total = 0;
    ALL_TENSES.forEach((t, i) => {
      const form = t.getForm(verb);
      if (form === null) return;
      total++;
      const isCorrect = (answers[i] || '').trim().toLowerCase() === form.toLowerCase();
      if (isCorrect) correct++;
      SRS.updateCard(`verb:${verbIdx}:${i}`, isCorrect);
    });
    setChecked(true);
    setScore({ correct, total });
  };

  if (!verb) return null;
  return (
    <div className="max-w-xl mx-auto px-4 py-8 fade-in">
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-xl font-bold">Verb Drill</h2>
        <button onClick={startDrill} className="px-4 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm">New Verb</button>
      </div>
      <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <div className="flex items-center justify-center gap-2 mb-1">
          <p className="text-2xl font-bold">{verb[5]}</p>
          <SpeakButton text={verb[0]} />
        </div>
        <p className="text-sm text-gray-500 text-center mb-6">Fill in all 8 tenses</p>
        <div className="space-y-3">
          {ALL_TENSES.map((tense, i) => {
            const form = tense.getForm(verb);
            if (form === null) return (
              <div key={tense.key} className="flex items-center gap-3 opacity-40">
                <span className={`w-36 text-sm font-medium ${tense.color}`}>{tense.label}</span>
                <span className="text-gray-600 text-sm">&mdash;</span>
              </div>
            );
            const userAns = (answers[i] || '').trim().toLowerCase();
            const isCorrect = checked && userAns === form.toLowerCase();
            const isWrong = checked && !isCorrect;
            return (
              <div key={tense.key} className="flex items-center gap-2">
                <span className={`w-36 text-xs sm:text-sm font-medium ${tense.color} flex-shrink-0`}>{tense.label}</span>
                <input type="text" value={answers[i] || ''} onChange={e => setAnswers({ ...answers, [i]: e.target.value })} disabled={checked}
                  placeholder={tense.key === 'perfekt' ? 'har + ...' : tense.key === 'pluskvamperfekt' ? 'hade + ...' : tense.key === 'futurum' ? 'ska + ...' : ''}
                  className={`flex-1 bg-gray-800 border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 ${isCorrect ? 'border-green-500 text-green-400' : ''} ${isWrong ? 'border-red-500 text-red-400' : 'border-gray-700'} disabled:opacity-70`}
                  autoComplete="off" autoCorrect="off" spellCheck="false" />
                {isWrong && <span className="text-sm text-green-400 font-medium whitespace-nowrap">{form}</span>}
                {isCorrect && <span className="text-green-400 text-sm">&#10003;</span>}
                {checked && <SpeakButton text={form} size="sm" />}
              </div>
            );
          })}
        </div>
        {!checked ? (
          <button onClick={checkAll} className="mt-6 w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Check All</button>
        ) : (
          <div className="mt-6 text-center">
            <p className={`text-lg font-bold ${score.correct === score.total ? 'text-green-400' : 'text-yellow-400'}`}>{score.correct}/{score.total}</p>
            <button onClick={startDrill} className="mt-3 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Next Verb</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---- Sentence Building ----
function SentenceBuilder() {
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [filter, setFilter] = useState('all');
  const inputRef = useRef(null);

  const categories = useMemo(() => ['all', ...new Set(SENTENCES.map(s => s[3]))], []);
  const filtered = useMemo(() => filter === 'all' ? SENTENCES : SENTENCES.filter(s => s[3] === filter), [filter]);
  const [order, setOrder] = useState(() => shuffle(Array.from({ length: filtered.length }, (_, i) => i)));

  useEffect(() => {
    setOrder(shuffle(Array.from({ length: filtered.length }, (_, i) => i)));
    setIdx(0); setInput(''); setFeedback(null);
  }, [filter]);

  useEffect(() => { if (!feedback && inputRef.current) inputRef.current.focus(); }, [idx, feedback]);

  const s = filtered[order[idx % filtered.length]];
  const sentenceIdx = SENTENCES.indexOf(s);

  const check = () => {
    const correct = input.trim().toLowerCase() === s[1].toLowerCase();
    SRS.updateCard(`sentence:${sentenceIdx}`, correct);
    setFeedback({ correct, answer: s[1] });
  };

  const next = () => {
    setFeedback(null); setInput('');
    setIdx(i => i + 1);
  };

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (feedback) next(); else if (input.trim()) check(); } };

  return (
    <div className="max-w-xl mx-auto px-4 py-8 fade-in">
      <h2 className="text-xl font-bold mb-4">Sentence Building</h2>
      <div className="flex flex-wrap gap-2 mb-6">
        {categories.map(c => (
          <button key={c} onClick={() => setFilter(c)}
            className={`px-3 py-1 rounded text-xs font-medium ${filter === c ? 'bg-amber-600 text-white' : 'bg-gray-800 text-gray-400 hover:text-white'}`}>
            {c === 'all' ? 'All' : c}
          </button>
        ))}
      </div>

      <div className={`bg-gray-900 rounded-xl p-8 border border-gray-800 ${feedback?.correct === true ? 'correct-flash' : ''} ${feedback?.correct === false ? 'wrong-flash' : ''}`}>
        <span className="text-xs font-medium px-2 py-0.5 rounded text-amber-400 bg-gray-800">{s[3]}</span>
        <p className="text-xl font-semibold text-center mt-4 mb-2">{s[0]}</p>
        <p className="text-sm text-gray-500 text-center mb-6">{s[2]}</p>

        <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
          disabled={feedback !== null} placeholder="Write the Swedish translation..."
          className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-base focus:outline-none focus:border-blue-500 disabled:opacity-50 resize-none"
          rows={2} autoComplete="off" autoCorrect="off" spellCheck="false" />

        {feedback && (
          <div className="mt-6 text-center fade-in">
            {feedback.correct ? (
              <div className="flex items-center justify-center gap-2">
                <p className="text-green-400 text-lg font-semibold">Correct!</p>
                <SpeakButton text={feedback.answer} />
              </div>
            ) : (
              <div>
                <p className="text-red-400 text-lg font-semibold mb-1">Not quite</p>
                <div className="flex items-center justify-center gap-2">
                  <p className="text-gray-300 text-sm">Answer: <span className="font-bold text-white">{feedback.answer}</span></p>
                  <SpeakButton text={feedback.answer} />
                </div>
              </div>
            )}
            <button onClick={next} className="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Next (Enter)</button>
          </div>

// ---- Preposition Drills ----
function PrepositionDrill() {
  const [order, setOrder] = useState(() => shuffle(Array.from({ length: PREPOSITIONS.length }, (_, i) => i)));
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });
  const inputRef = useRef(null);

  useEffect(() => { if (!feedback && inputRef.current) inputRef.current.focus(); }, [idx, feedback]);

  const p = PREPOSITIONS[order[idx % PREPOSITIONS.length]];
  const prepIdx = order[idx % PREPOSITIONS.length];

  const check = () => {
    const correct = input.trim().toLowerCase() === p[1].toLowerCase();
    SRS.updateCard(`prep:${prepIdx}`, correct);
    setFeedback({ correct, answer: p[1] });
    setSessionStats(s => ({ correct: s.correct + (correct ? 1 : 0), wrong: s.wrong + (correct ? 0 : 1) }));
  };

  const next = () => {
    setFeedback(null); setInput('');
    if (idx >= order.length - 1) { setOrder(shuffle(Array.from({ length: PREPOSITIONS.length }, (_, i) => i))); setIdx(0); }
    else setIdx(i => i + 1);
  };

  const handleKey = (e) => { if (e.key === 'Enter') { if (feedback) next(); else if (input.trim()) check(); } };

  // Render sentence with blank highlighted
  const parts = p[0].split('___');

  return (
    <div className="max-w-xl mx-auto px-4 py-8 fade-in">
      <h2 className="text-xl font-bold mb-6">Preposition Drill</h2>

      <div className={`bg-gray-900 rounded-xl p-8 border border-gray-800 ${feedback?.correct === true ? 'correct-flash' : ''} ${feedback?.correct === false ? 'wrong-flash' : ''}`}>
        <span className="text-xs font-medium px-2 py-0.5 rounded text-rose-400 bg-gray-800">{p[3]}</span>

        <p className="text-xl font-semibold text-center mt-4 mb-2">
          {parts[0]}<span className="text-rose-400 border-b-2 border-rose-400 px-1">{'_____'}</span>{parts[1]}
        </p>
        <p className="text-sm text-gray-500 text-center mb-6">{p[2]}</p>

        <input ref={inputRef} type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
          disabled={feedback !== null} placeholder="Type the preposition..."
          className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-lg focus:outline-none focus:border-blue-500 disabled:opacity-50"
          autoComplete="off" autoCorrect="off" spellCheck="false" />

        {feedback && (
          <div className="mt-6 text-center fade-in">
            {feedback.correct ? (
              <div className="flex items-center justify-center gap-2">
                <p className="text-green-400 text-lg font-semibold">Correct!</p>
                <SpeakButton text={p[0].replace('___', p[1])} />
              </div>
            ) : (
              <div>
                <p className="text-red-400 text-lg font-semibold mb-1">Not quite</p>
                <div className="flex items-center justify-center gap-2">
                  <p className="text-gray-300">Answer: <span className="font-bold text-white">{feedback.answer}</span></p>
                  <SpeakButton text={p[0].replace('___', p[1])} />
                </div>
              </div>
            )}
            <button onClick={next} className="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Next (Enter)</button>
          </div>
        )}
        {!feedback && input.trim() && (
          <button onClick={check} className="mt-4 w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Check (Enter)</button>
        )}
      </div>

      <div className="flex justify-center gap-8 mt-6 text-sm text-gray-500">
        <span className="text-green-400">{sessionStats.correct} correct</span>
        <span className="text-red-400">{sessionStats.wrong} wrong</span>
        <span>{idx + 1}/{PREPOSITIONS.length}</span>
      </div>
    </div>
  );
}

// ---- Listening Mode ----
function ListenMode() {
  const [input, setInput] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });
  const inputRef = useRef(null);

  // Mix of phrases, vocab, and verb forms for listening practice
  const items = useMemo(() => {
    const pool = [];
    PHRASES.forEach((p, i) => pool.push({ id: `phrase:${i}`, text: p[0], english: p[1], type: 'phrase' }));
    Object.entries(VOCAB).forEach(([cat, words]) => {
      words.forEach((w, i) => pool.push({ id: `vocab:${cat}:${i}`, text: w[0], english: w[1], type: 'vocab' }));
    });
    SENTENCES.forEach((s, i) => pool.push({ id: `sentence:${i}`, text: s[1], english: s[0], type: 'sentence' }));
    return pool;
  }, []);

  const [order, setOrder] = useState(() => shuffle(Array.from({ length: items.length }, (_, i) => i)));
  const [idx, setIdx] = useState(0);

  useEffect(() => { if (!feedback && inputRef.current) inputRef.current.focus(); }, [idx, feedback]);

  const item = items[order[idx % items.length]];

  // Auto-play on new card
  useEffect(() => {
    const timer = setTimeout(() => speak(item.text), 300);
    return () => clearTimeout(timer);
  }, [idx]);

  const check = () => {
    const correct = input.trim().toLowerCase() === item.text.toLowerCase();
    SRS.updateCard(item.id, correct);
    setFeedback({ correct, answer: item.text });
    setSessionStats(s => ({ correct: s.correct + (correct ? 1 : 0), wrong: s.wrong + (correct ? 0 : 1) }));
  };

  const next = () => {
    setFeedback(null); setInput('');
    if (idx >= order.length - 1) { setOrder(shuffle(Array.from({ length: items.length }, (_, i) => i))); setIdx(0); }
    else setIdx(i => i + 1);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (feedback) next();
      else if (input.trim()) check();
    }
  };

  return (
    <div className="max-w-xl mx-auto px-4 py-8 fade-in">
      <h2 className="text-xl font-bold mb-2">Listening Comprehension</h2>
      <p className="text-sm text-gray-500 mb-6">Listen and type what you hear in Swedish</p>

      <div className={`bg-gray-900 rounded-xl p-8 border border-gray-800 ${feedback?.correct === true ? 'correct-flash' : ''} ${feedback?.correct === false ? 'wrong-flash' : ''}`}>
        <div className="flex flex-col items-center mb-6">
          <button onClick={() => speak(item.text)}
            className="w-20 h-20 rounded-full bg-blue-600 hover:bg-blue-500 flex items-center justify-center text-3xl transition-transform active:scale-95 mb-4">
            &#9654;
          </button>
          <button onClick={() => speak(item.text, 'sv-SE')}
            className="text-xs text-gray-500 hover:text-gray-300">Play again</button>
          <p className="text-sm text-gray-500 mt-3">{item.english}</p>
        </div>

        {item.type === 'sentence' ? (
          <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
            disabled={feedback !== null} placeholder="Type what you hear..."
            className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-base focus:outline-none focus:border-blue-500 disabled:opacity-50 resize-none"
            rows={2} autoComplete="off" autoCorrect="off" spellCheck="false" />
        ) : (
          <input ref={inputRef} type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
            disabled={feedback !== null} placeholder="Type what you hear..."
            className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-center text-lg focus:outline-none focus:border-blue-500 disabled:opacity-50"
            autoComplete="off" autoCorrect="off" spellCheck="false" />
        )}

        {feedback && (
          <div className="mt-6 text-center fade-in">
            {feedback.correct ? (
              <p className="text-green-400 text-lg font-semibold">Correct!</p>
            ) : (
              <div>
                <p className="text-red-400 text-lg font-semibold mb-1">Not quite</p>
                <p className="text-gray-300">Answer: <span className="font-bold text-white">{feedback.answer}</span></p>
              </div>
            )}
            <button onClick={next} className="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Next (Enter)</button>
          </div>
        )}
        {!feedback && input.trim() && (
          <button onClick={check} className="mt-4 w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium">Check (Enter)</button>
        )}
      </div>

      <div className="flex justify-center gap-8 mt-6 text-sm text-gray-500">
        <span className="text-green-400">{sessionStats.correct} correct</span>
        <span className="text-red-400">{sessionStats.wrong} wrong</span>
      </div>
    </div>
  );
}

// ---- Progress / Stats ----
function Progress() {
  const stats = SRS.getStats();
  const data = SRS.load();
  const totalCards = useMemo(() => {
    let count = 0;
    VERBS.forEach(v => { ALL_TENSES.forEach(t => { if (t.getForm(v) !== null) count++; }); });
    Object.values(VOCAB).forEach(w => count += w.length);
    count += PHRASES.length + SENTENCES.length + PREPOSITIONS.length;
    return count;
  }, []);
  const pct = Math.round((stats.mastered / Math.max(1, totalCards)) * 100);
  const accuracy = stats.totalCorrect + stats.totalWrong > 0
    ? Math.round((stats.totalCorrect / (stats.totalCorrect + stats.totalWrong)) * 100) : 0;

  return (
    <div className="max-w-3xl mx-auto px-4 py-8 fade-in">

        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800 text-center">

        </div>
        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800 text-center">
          <p className="text-3xl font-bold text-yellow-400">{stats.learning}</p><p className="text-xs text-gray-500">Learning</p>
        </div>
        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800 text-center">
          <p className="text-3xl font-bold text-purple-400">{accuracy}%</p><p className="text-xs text-gray-500">Accuracy</p>
        </div>
      </div>
      <div className="bg-gray-900 rounded-xl p-6 border border-gray-800 mb-8">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium">Overall Mastery</span>
          <span className="text-sm text-gray-400">{stats.mastered}/{totalCards} ({pct}%)</span>
        </div>
        <div className="h-3 bg-gray-800 rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: 'linear-gradient(90deg, #3b82f6, #8b5cf6)' }} />
        </div>
      </div>

      {/* Card type breakdown */}
      <div className="bg-gray-900 rounded-xl p-6 border border-gray-800 mb-8">
        <h3 className="font-bold mb-4">Card Breakdown</h3>
        <div className="space-y-3 text-sm">
          {[
            ['Verb forms', `${VERBS.length} verbs x 8 tenses`, 'text-blue-400'],
            ['Vocabulary', `${Object.values(VOCAB).reduce((s, w) => s + w.length, 0)} words`, 'text-cyan-400'],
            ['Sentences', `${SENTENCES.length} sentences`, 'text-amber-400'],
            ['Phrases', `${PHRASES.length} phrases`, 'text-emerald-400'],
            ['Prepositions', `${PREPOSITIONS.length} drills`, 'text-rose-400'],
          ].map(([label, count, color]) => (
            <div key={label} className="flex justify-between">
              <span className={color}>{label}</span>
              <span className="text-gray-400">{count}</span>
            </div>
          ))}
          <div className="border-t border-gray-800 pt-2 flex justify-between font-bold">
            <span>Total</span><span>{totalCards} cards</span>
          </div>
        </div>
      </div>

      <div className="mt-8 text-center">
        <button onClick={() => { if (confirm('Reset all progress?')) { SRS.reset(); window.location.reload(); } }}
          className="text-xs text-gray-600 hover:text-red-400 transition-colors">Reset all progress</button>
      </div>
    </div>
  );
}

// ---- App ----
function App() {
  const [view, setView] = useState('study');
  const [stats, setStats] = useState(SRS.getStats());
  useEffect(() => { const i = setInterval(() => setStats(SRS.getStats()), 3000); return () => clearInterval(i); }, []);

  return (
    <div className="min-h-screen">
      <Nav view={view} setView={setView} stats={stats} />
      {view === 'study' && <StudyMode />}
      {view === 'verbs' && <VerbDrills />}
      {view === 'sentences' && <SentenceBuilder />}
      {view === 'phrases' && <PhrasePractice />}
      {view === 'prepositions' && <PrepositionDrill />}
      {view === 'listen' && <ListenMode />}
      {view === 'reference' && <Reference />}
      {view === 'stats' && <Progress />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
